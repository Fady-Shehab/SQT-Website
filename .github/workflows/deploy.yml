name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - staging
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn build

      - name: Prepare deployment
        run: |
          # Copy standalone HTML pages (Vite only handles index.html)
          cp -f post.html profile.html project.html 404.html dist/ 2>/dev/null || true

          # Copy root JS files (overwrites any empty placeholders from public/js)
          cp -rf js/* dist/js/ 2>/dev/null || true

          # Ensure .nojekyll exists (GitHub Pages ignores _underscore_ paths without it)
          touch dist/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
