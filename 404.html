<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, follow" />
<title>404 — الصفحة غير موجودة | شرق تك</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />

<style>
/* ══════════════════════════════════════
   DESIGN TOKENS — same system as the rest of the site
══════════════════════════════════════ */
:root,[data-theme="dark"]{
  --bg-base:#080E1A;--bg-surface:#0F172A;--bg-card:#131F35;--bg-subtle:#1a2744;
  --gold:#C9A84C;--gold-bright:#E8C76B;--gold-dim:rgba(201,168,76,.10);--gold-border:rgba(201,168,76,.22);--gold-glow:rgba(201,168,76,.15);
  --green:#1A5C45;--green-light:#22735A;--green-dim:rgba(26,92,69,.18);--green-border:rgba(26,92,69,.35);
  --text-primary:#EEF2F7;--text-secondary:#94A3B8;--text-muted:#475569;
  --border-subtle:rgba(255,255,255,.05);--border-mid:rgba(255,255,255,.09);
  --shadow-hover:0 12px 56px rgba(0,0,0,.6);
  --nav-bg:transparent;--nav-bg-scroll:rgba(8,14,26,.92);
}
[data-theme="light"]{
  --bg-base:#F7F5F0;--bg-surface:#FFFFFF;--bg-card:#FFFFFF;--bg-subtle:#F0EDE6;
  --gold:#B8922A;--gold-bright:#D4AF37;--gold-dim:rgba(184,146,42,.08);--gold-border:rgba(184,146,42,.28);--gold-glow:rgba(184,146,42,.12);
  --green:#1A5C45;--green-light:#22735A;--green-dim:rgba(26,92,69,.08);--green-border:rgba(26,92,69,.25);
  --text-primary:#0F1923;--text-secondary:#3D4F61;--text-muted:#8A96A3;
  --border-subtle:rgba(0,0,0,.06);--border-mid:rgba(0,0,0,.10);
  --shadow-hover:0 8px 40px rgba(0,0,0,.14);
  --nav-bg:rgba(247,245,240,.80);--nav-bg-scroll:rgba(255,255,255,.95);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg-base);color:var(--text-primary);direction:rtl;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .35s,color .35s;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}ul{list-style:none}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;background:none}

.container{width:100%;max-width:1240px;margin:0 auto;padding:0 20px}
@media(min-width:768px){.container{padding:0 36px}}
@media(min-width:1024px){.container{padding:0 56px}}

/* ── EGYPTIAN GEOMETRIC PATTERN ── */
.eg-pattern{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.eg-pattern::before{content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(45deg,var(--gold-border) 0,var(--gold-border) 1px,transparent 1px,transparent 56px),
    repeating-linear-gradient(-45deg,var(--gold-border) 0,var(--gold-border) 1px,transparent 1px,transparent 56px);
  opacity:.18}

/* ── FLOATING GEMS ── */
.hero-gems{position:absolute;inset:0;pointer-events:none;z-index:0}
.gem{position:absolute;background:var(--gold);transform:rotate(45deg);opacity:.15;animation:gemFloat 0s ease-in-out infinite alternate}
.gem-1{width:8px;height:8px;top:14%;right:9%;animation-duration:6s}
.gem-2{width:5px;height:5px;top:58%;left:7%;animation-duration:8s;animation-delay:1s}
.gem-3{width:4px;height:4px;top:28%;right:22%;animation-duration:7s;animation-delay:2s;opacity:.09}
.gem-4{width:6px;height:6px;bottom:24%;left:13%;animation-duration:9s;animation-delay:.5s;opacity:.1}
@keyframes gemFloat{from{transform:rotate(45deg) translateY(0)}to{transform:rotate(45deg) translateY(-14px)}}

/* ══════════════════════════════════════
   404 HERO
══════════════════════════════════════ */
#err-hero{
  flex:1;position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:120px 20px 80px;
  background:var(--bg-base);
}
#err-hero::before{
  content:'';position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);
  width:900px;height:600px;
  background:radial-gradient(ellipse at center, rgba(201,168,76,.08) 0%, transparent 65%);
  pointer-events:none;z-index:0;
}

.err-content{position:relative;z-index:2;text-align:center;max-width:620px}

.err-pill{
  display:inline-flex;align-items:center;gap:10px;padding:7px 20px;
  border:1px solid var(--gold-border);border-radius:999px;
  font-size:.78rem;font-weight:600;color:var(--gold);
  background:var(--gold-dim);margin-bottom:32px;
  animation:fadeDown .7s cubic-bezier(0,0,.2,1) both;
}
.err-pill-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

.err-code{
  font-family:'Cairo',sans-serif;
  font-size:clamp(5rem,16vw,9rem);font-weight:900;line-height:1;
  margin-bottom:8px;
  background:linear-gradient(160deg, var(--gold-bright) 0%, var(--gold) 40%, #A07828 70%, var(--gold-bright) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 5s linear infinite, fadeUp .85s cubic-bezier(0,0,.2,1) .1s both;
}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}

.err-title{
  font-size:clamp(1.3rem,3vw,1.8rem);font-weight:800;color:var(--text-primary);
  margin-bottom:14px;line-height:1.4;
  animation:fadeUp .85s cubic-bezier(0,0,.2,1) .2s both;
}
.err-sub{
  font-size:.94rem;color:var(--text-secondary);line-height:1.9;
  margin-bottom:36px;
  animation:fadeUp .85s cubic-bezier(0,0,.2,1) .3s both;
}

.err-ornament{
  display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:36px;
  animation:fadeUp .85s cubic-bezier(0,0,.2,1) .35s both;
}
.err-ornament::before,.err-ornament::after{content:'';display:block;width:60px;height:1px;background:var(--gold-border)}
.err-diamond{width:8px;height:8px;background:var(--gold);transform:rotate(45deg)}

.err-actions{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:44px;
  animation:fadeUp .85s cubic-bezier(0,0,.2,1) .4s both;
}
.btn{display:inline-flex;align-items:center;gap:9px;padding:13px 30px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.92rem;font-weight:700;transition:all .25s;cursor:pointer;white-space:nowrap}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-bright) 100%);color:#0F1923;box-shadow:0 4px 20px var(--gold-glow)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,.35);filter:brightness(1.08)}
.btn-outline{background:transparent;color:var(--text-primary);border:1px solid var(--border-mid)}
.btn-outline:hover{border-color:var(--gold-border);color:var(--gold);transform:translateY(-2px)}
.btn svg{width:16px;height:16px;flex-shrink:0}

/* Quick links pills */
.err-quick{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  animation:fadeUp .85s cubic-bezier(0,0,.2,1) .5s both;
}
.err-quick-label{font-size:.74rem;color:var(--text-muted);font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.err-quick-links{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.err-qlink{
  padding:8px 18px;border-radius:999px;font-size:.82rem;font-weight:600;
  border:1px solid var(--border-mid);color:var(--text-secondary);
  background:var(--bg-card);transition:all .22s ease;
}
.err-qlink:hover{border-color:var(--gold-border);color:var(--gold);transform:translateY(-2px)}

/* ── FOOTER ── */
footer{background:var(--bg-surface);border-top:1px solid var(--border-subtle);padding:32px 0;position:relative;z-index:1}
.foot-row{display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center}
@media(min-width:768px){.foot-row{flex-direction:row;justify-content:space-between}}
.foot-copy{font-size:.77rem;color:var(--text-muted)}
.footer-stripe{height:3px;background:linear-gradient(90deg,var(--green),var(--gold),var(--green))}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>



<!-- ══════════ 404 HERO ══════════ -->
<main id="err-hero" aria-labelledby="err-h1">
  <div class="eg-pattern" aria-hidden="true"></div>
  <div class="hero-gems" aria-hidden="true">
    <div class="gem gem-1"></div><div class="gem gem-2"></div>
    <div class="gem gem-3"></div><div class="gem gem-4"></div>
  </div>

  <div class="err-content">

    <div class="err-pill">
      <span class="err-pill-dot" aria-hidden="true"></span>
      خطأ في المسار
    </div>

    <div class="err-code" aria-hidden="true">404</div>

    <h1 id="err-h1" class="err-title">الصفحة اللي بتدوّر عليها مش موجودة</h1>

    <p class="err-sub">
      يمكن اللينك غلط، أو الصفحة اتنقلت، أو مش موجودة من الأساس.
      اتأكد من العنوان أو رجّع للرئيسية وابدأ من جديد.
    </p>

    <div class="err-ornament" aria-hidden="true">
      <div class="err-diamond"></div>
    </div>

    <div class="err-actions">
      <a href="/SQT-Website/index.html" class="btn btn-gold">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        العودة للرئيسية
      </a>
      <button class="btn btn-outline" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6" transform="scale(-1,1) translate(-24,0)"/></svg>
        رجوع للصفحة السابقة
      </button>
    </div>

    <div class="err-quick">
      <span class="err-quick-label">أو تصفح</span>
      <div class="err-quick-links">
        <a href="/SQT-Website/team.html"         class="err-qlink">الفريق</a>
        <a href="/SQT-Website/projects.html"     class="err-qlink">المشاريع</a>
        <a href="/SQT-Website/blog.html"         class="err-qlink">المدونة</a>
        <a href="/SQT-Website/hall-of-fame.html" class="err-qlink">قاعة المجد</a>
      </div>
    </div>

  </div>
</main>

<!-- ══════════ FOOTER ══════════ -->
<footer role="contentinfo">
  <div class="container">
    <div class="foot-row">
      <p class="foot-copy">© 2026 شرق تك — جميع الحقوق محفوظة</p>
    </div>
  </div>
</footer>
  <div class="footer-stripe" aria-hidden="true"></div>

<!-- ══════════ JS — fully inline, no external dependencies ══════════ -->
<script>
'use strict';
/* Theme toggle */
var html = document.documentElement;
var THEME_KEY = 'sharq-theme';
function applyTheme(t){ html.setAttribute('data-theme', t); try { localStorage.setItem(THEME_KEY, t); } catch(e){} }
var saved = 'dark';
try { saved = localStorage.getItem(THEME_KEY) || 'dark'; } catch(e){}
applyTheme(saved);
document.getElementById('themeToggle').addEventListener('click', function(){
  applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
/* Back button */
document.getElementById('backBtn').addEventListener('click', function(){
  if (window.history.length > 1) window.history.back();
  else window.location.href = '/SQT-Website/index.html';
});

/* Page fade-in */
document.body.style.opacity = '0';
document.body.style.transition = 'opacity .38s ease';
window.addEventListener('load', function(){ document.body.style.opacity = '1'; });
</script>
</body>
</html>
